<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Schedule</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="navbar"></div>

<header>
    <h2 style="margin:20px 0; text-align:center;">Class Schedule</h2>
</header>

<main>
    <iframe 
    src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2-9Gj8YhZc56IpHbX-KJeWkU5VQinMCaYwEVy0JolOxkCamiUYq7rq4VqnLAJOxu-RyRXo4LI3eZI/pubhtml?widget=true&headers=false"
    width="100%"
    height="600"
    style="border:none; max-width:100%;">
    </iframe>
</main>

<script>
window.addEventListener('scroll', function() {
    const button = document.querySelector('.back-to-top');
    if (window.pageYOffset > 100) {
        button.style.display = 'block';
    } else {
        button.style.display = 'none';
    }
});
</script>
<button class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">↑</button>

<script src="navbar.js"></script>
</body>
</html>
