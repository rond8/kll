<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
 <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
<body>
    <h1 id="main-title">Loading...</h1>
    <div id="content-container"></div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const moduleName = urlParams.get('module');

    if (moduleName) {
        const script = document.createElement('script');
        
       
        script.src = `/js/${moduleName}.js`; 

        script.onload = () => {
            console.log(`Module: ${moduleName} loaded from the scripts folder.`);
        };

        script.onerror = () => {
            console.error("Failed to load the script. Check if the file exists in the folder.");
            document.getElementById('main-title').innerText = "Module not found.";
        };

        document.body.appendChild(script);
    }
</script>
</body>
</html>
