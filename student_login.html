<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLL Student Portal</title>

</head>

<body>
<div id="navbar"></div>
    <header class="w-full bg-gray-200 border-b-4 border-yellow-500">
    <div class="w-full h-64 md:h-96 bg-gray-300 flex items-center justify-center text-gray-500 italic text-xl shadow-inner overflow-hidden">
        <img src="asset/img/studentportal.jpg" alt="Student Portal" class="w-full h-full object-contain" onerror="this.style.display='none'; this.parentNode.innerHTML='[Student Portal Banner]'">
    </div>
</header>

<div id="login">

<h3>Student Login</h3>

<input type="text" id="username" placeholder="Student Number">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="result"></div>

<script src="student.js"></script>
<script src="navbar.js"></script>

</body>
</html>
