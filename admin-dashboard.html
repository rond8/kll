<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLL Admin Dashboard</title>

    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'admin-login.html'; 
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-kll-maroon { background-color: #800000; }
        .text-kll-maroon { color: #800000; }
        .border-kll-maroon { border-color: #800000; }
        .sidebar-link:hover { background-color: rgba(255, 255, 255, 0.1); }
        .active-link { background-color: rgba(255, 255, 255, 0.2); border-left: 4px solid #eab308; }
        
        #sidebar { transition: transform 0.3s ease-in-out; }
        @media (max-width: 768px) {
            .sidebar-hidden { transform: translateX(-100%); }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans flex min-h-screen overflow-x-hidden">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black opacity-50 z-40 hidden md:hidden" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="w-64 bg-kll-maroon text-white sticky top-0 z-50 fixed md:relative h-screen sidebar-hidden md:transform-none shadow-2xl">
        <div class="p-6 flex flex-col items-center border-b border-red-900">
            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-kll-maroon font-bold text-xl mb-2 shadow-lg">KLL</div>
            <span class="text-sm font-semibold tracking-widest uppercase">Admin Portal</span>
        </div>
        <nav class="mt-6">
            <a href="dashboard.html" class="sidebar-link active-link flex items-center py-3 px-6 transition">
                <i class="fas fa-chart-line w-6"></i> Dashboard
            </a>
            <a href="https://www.dropbox.com/scl/fi/53yy17muuqq3e4b0pm3i4/announce.txt?rlkey=fp2sr8w7q160rsrur9fqaqfbb&st=nqihe0m4&dl=0" class="sidebar-link flex items-center py-3 px-6 transition">
                <i class="fas fa-bullhorn w-6"></i> Announcements
            </a>
            <a href="https://docs.google.com/spreadsheets/d/1LpzdEk6IswxmsEKVe1EQblYVYpuE7u4jrREtvXurxNw/edit?usp=sharing" class="sidebar-link flex items-center py-3 px-6 transition">
                <i class="fas fa-users w-6"></i> Student Records
            </a>
             <a href="https://docs.google.com/spreadsheets/d/12ccSC3EGVXCqWmyf48_bs4WUpf4WxkoH_oomeY6WlFA/edit?usp=sharing" class="sidebar-link flex items-center py-3 px-6 transition">
                <i class="fas fa-newspaper"></i> NEWS
            </a>
   
            <div class="mt-10 px-6">
                <button onclick="handleLogout()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-2 rounded-lg transition shadow-md">
                    <i class="fas fa-sign-out-alt mr-2"></i> Logout
                </button>
            </div>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center px-4 md:px-8 border-b">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden p-2 text-gray-600 hover:bg-gray-100 rounded">
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="greeting" class="text-xs font-bold text-gray-400 uppercase tracking-tight">Good Day</p>
                    <p class="text-sm font-bold text-gray-700">Admin User</p>
                </div>
                <button onclick="fetchLiveStats()" class="p-2 text-kll-maroon hover:bg-gray-100 rounded-full transition">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <img src="https://ui-avatars.com/api/?name=Admin+User&background=800000&color=fff" class="w-10 h-10 rounded-full border-2 border-kll-maroon">
            </div>
        </header>

        <main class="p-4 md:p-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-red-800">
                    <p class="text-gray-500 text-xs font-bold uppercase">Total Students</p>
                    <p id="stat-total-students" class="text-4xl font-black text-gray-800 tracking-tighter">...</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-yellow-500">
                    <p class="text-gray-500 text-xs font-bold uppercase">Active Courses</p>
                    <p id="stat-active-courses" class="text-4xl font-black text-gray-800 tracking-tighter">...</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-blue-500">
                    <p class="text-gray-500 text-xs font-bold uppercase">Enrollment Records</p>
                    <p id="stat-enrollments" class="text-4xl font-black text-gray-800 tracking-tighter">...</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
                <h2 class="text-lg font-bold text-gray-800 mb-4">Live Activity</h2>
                <p class="text-gray-500 text-sm italic">Monitoring system active...</p>
            </div>
        </main>
    </div>
    <script src="admin.js"></script>
</body>
</html>
