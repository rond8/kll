<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLL EDUCATIONAL SITE</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html {
            scroll-behavior: smooth;
        }
        .bg-kll-maroon {
            background-color: #800000;
        }
        .text-kll-maroon {
            color: #800000;
        }
        .border-kll-maroon {
            border-color: #800000;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans leading-relaxed">

    <div id="navbar"></div>
    <nav class="bg-kll-maroon text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
             <div class="flex items-center gap-3">
    <div class="w-10 h-10 bg-white rounded-md flex items-center justify-center text-kll-maroon font-bold text-xs shadow-inner overflow-hidden">
        <img src="asset/img/schoolicon.jpg" alt="KLL Logo" class="w-full h-full object-cover">
    </div>
    <span class="font-bold text-lg sm:text-xl tracking-wide">Kolehiyo ng Lungsod ng Lipa</span>
</div>
            </div>
        </div>
    </nav>

  
    <header class="w-full bg-gray-200 border-b-4 border-yellow-500">
        <div class="w-full h-64 md:h-96 bg-gray-300 flex items-center justify-center text-gray-500 italic text-xl shadow-inner overflow-hidden">
            <img src="asset/img/index.jpg" alt="KLL Index" class="w-full h-full object-contain" onerror="this.style.display='none'; this.parentNode.innerHTML='[KLL Campus Banner]'">
        </div>
    </header>


    <main class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8 flex flex-col gap-8">
          
         <div class="text-center py-3">     <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-red-800">
                    <p class="text-gray-500 text-xs font-bold uppercase">Total Students</p>
                    <p id="stat-total-students" class="text-4xl font-black text-gray-800 tracking-tighter">...</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-yellow-500">
                    <p class="text-gray-500 text-xs font-bold uppercase">Active Courses</p>
                    <p id="stat-active-courses" class="text-4xl font-black text-gray-800 tracking-tighter">...</p>
                </div>
             <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-yellow-500">
                    <p class="text-gray-500 text-xs font-bold uppercase">SINCE</p>
                    <p id="stat-active-courses" class="text-2xl font-black text-gray-800 tracking-tighter">February 14, 1994</p>
                </div></div>
        <div class="text-left py-4">
            <button class="announcement-btn bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105 text-lg" onclick="window.location.href = 'announcements.html';">
                View Announcements
            </button>
              <button class="announcement-btn bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105 text-lg" onclick="window.location.href = 'CollCalendar.html';">
          KLL Collegiate Calendar
            </button>
                       <button class="announcement-btn bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105 text-lg" onclick="window.location.href = 'student_login.html';">
        STUDENT PORTAL
            </button>
             <button class="announcement-btn bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105 text-lg" 
             onclick="window.location.href = 'facilities.html';">
      FACILITIES 
            </button>
              <button class="announcement-btn bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105 text-lg" 
             onclick="window.location.href = 'e-library.html';">
E-library
            </button>
               <button class="announcement-btn bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105 text-lg" 
             onclick="window.location.href = 'gallery.html';">
GALLERY
            </button>
           
        </div>
    </main>

<div class="sha1"></div>

    <!-- Daily Inspiration Section (API Driven) -->
<div class="max-w-4xl mx-auto mb-8">
    <div class="bg-white border-l-8 border-yellow-500 rounded-lg shadow-md p-6 flex flex-col md:flex-row items-center gap-6">
        <div class="text-4xl">💡</div>
        <div>
            <h3 class="text-sm font-bold uppercase tracking-widest text-gray-400">Daily Inspiration for KLLians</h3>
            <p id="inspiration-text" class="text-xl text-kll-maroon font-serif italic mt-1">Loading wisdom...</p>
            <button onclick="fetchInspiration()" class="mt-3 text-xs text-yellow-600 hover:underline font-bold">
                Get New Advice →
            </button>
        </div>
    </div>
</div>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white text-center py-6 mt-8">
        <p>&copy; 2026 Kolehiyo ng Lungsod ng Lipa</p>
        <div class="mt-4">
            <a href="admin-login.html" class="text-gray-500 hover:text-white text-xs transition">Administrator Login</a>
        </div>
    </footer>

    <!-- Back to Top Button -->
    <button class="back-to-top fixed bottom-6 right-6 bg-kll-maroon text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center text-xl hover:bg-red-900 transition-colors hidden z-50 cursor-pointer border-2 border-white" onclick="window.scrollTo({top: 0, behavior: 'smooth'});" aria-label="Back to top">
        &uarr;
    </button>

    <!-- Announcement Modal -->
    <div id="announcementModal" class="modal fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-[60] backdrop-blur-sm transition-opacity">
        <div class="modal-content bg-white rounded-2xl shadow-2xl p-6 w-11/12 max-w-md relative">
            <span class="close absolute top-4 right-4 text-gray-400 hover:text-red-600 transition-colors font-bold text-2xl cursor-pointer" onclick="document.getElementById('announcementModal').classList.add('hidden')">&times;</span>
            <h2 class="text-2xl font-extrabold text-kll-maroon mb-4 border-b pb-2">📢 School Announcement</h2>
            <div id="announcementText" class="text-gray-700 p-4">
                <div id="loading" class="loading-spinner flex flex-col justify-center items-center py-6">
                    <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-kll-maroon mb-3"></div>
                    <span class="text-gray-500 text-sm font-medium">Loading announcements...</span>
                </div>
            </div>
        </div>
    </div>


    <script src="alert.js"></script>
    <script src="navbar.js"></script>
    <script src="js/animation.js"></script>
      <script src="admin.js"></script>
    <script>

        window.addEventListener('scroll', function() {
            const button = document.querySelector('.back-to-top');
            if (window.pageYOffset > 100) {
                button.classList.remove('hidden');
            } else {
                button.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
