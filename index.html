<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLL EDUCATIONAL SITE</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        .bg-kll-maroon { background-color: #800000; }
        .text-kll-maroon { color: #800000; }
        .border-kll-maroon { border-color: #800000; }

        /* --- RESPONSIVE GEOMETRIC LOGO CSS --- */
        .logo-body-wrapper {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1rem;
            display: flex;
            justify-content: center;
            /* Smooth transition for the JS background change */
            transition: background-color 0.5s ease, border-radius 0.5s ease;
            background-color: transparent;
        }

        .parent-logo {
            display: grid;
            grid-template-columns: repeat(9, 1fr); 
            grid-template-rows: repeat(5, 1fr);
            grid-column-gap: 1%;
            width: 100%;
            aspect-ratio: 9 / 5; 
            transform: skewX(-5deg);
        }

        .d-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 1.6vw; 
            text-align: center;
            z-index: 1;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        /* Responsive Text Scaling */
        @media (max-width: 640px) { .d-box { font-size: 2.8vw; } }
        @media (min-width: 1024px) { .d-box { font-size: 16px; } }

        .d-box:hover {
            transform: scale(1.05) translateY(-5px);
            filter: brightness(1.2);
            z-index: 10;
        }

        .d-box::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #800000;
            z-index: -1;
        }

        .text-inner { transform: skewX(5deg); padding: 4px; line-height: 1.1; }

        /* Polygon shapes */
        .slant-right::before { clip-path: polygon(0 0, 70% 0, 100% 100%, 30% 100%); }
        .slant-left::before  { clip-path: polygon(30% 0, 100% 0, 70% 100%, 0% 100%); }
        .straight::before    { clip-path: polygon(10% 0, 90% 0, 90% 100%, 10% 100%); }
        .base::before        { clip-path: polygon(0 0, 100% 0, 100% 70%, 0 70%); }

        /* Grid Placement */
        .k-stem { grid-area: 1 / 1 / 6 / 2; }
        .k-top  { grid-area: 1 / 2 / 4 / 3; }
        .k-bot  { grid-area: 3 / 2 / 6 / 3; }
        .l1-stem { grid-area: 1 / 4 / 6 / 5; }
        .l1-base { grid-area: 5 / 5 / 6 / 6; }
        .l2-stem { grid-area: 1 / 7 / 6 / 8; }
        .l2-base { grid-area: 5 / 8 / 6 / 9; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans leading-relaxed">

    <nav class="bg-kll-maroon text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-md flex items-center justify-center text-kll-maroon font-bold text-xs shadow-inner overflow-hidden">
                        <img src="asset/img/schoolicon.jpg" alt="KLL Logo" class="w-full h-full object-cover">
                    </div>
                    <span class="font-bold text-lg sm:text-xl tracking-wide">Kolehiyo ng Lungsod ng Lipa</span>
                </div>
            </div>
        </div>
    </nav>

    <header class="w-full bg-gray-200 border-b-4 border-yellow-500">
        <div class="w-full h-64 md:h-96 bg-gray-300 flex items-center justify-center text-gray-500 italic text-xl shadow-inner overflow-hidden">
            <img src="asset/img/index.jpg" alt="KLL Index" class="w-full h-full object-contain" onerror="this.style.display='none'; this.parentNode.innerHTML='[KLL Campus Banner]'">
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8 flex flex-col gap-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-red-800 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">Total Students</p>
                <p id="stat-total-students" class="text-4xl font-black text-gray-800 tracking-tighter">...</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-yellow-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">Active Courses</p>
                <p id="stat-active-courses" class="text-4xl font-black text-gray-800 tracking-tighter">...</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-yellow-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">SINCE</p>
                <p class="text-2xl font-black text-gray-800 tracking-tighter">February 14, 1994</p>
            </div>
        </div>

        <section class="logo-body-wrapper" id="dynamic-logo-section">
            <div class="parent-logo">
                <div class="k-stem d-box straight" onclick="window.location.href='about.html';"><div class="text-inner">ABOUT</div></div>
                <div class="k-top d-box slant-left" onclick="window.location.href='kll-info.html';"><div class="text-inner">E</div></div>
                <div class="k-bot d-box slant-right" onclick="window.location.href='pride.html';"><div class="text-inner">PRIDE</div></div>
                
                <div class="l1-stem d-box straight" onclick="window.location.href='student_login.html';"><div class="text-inner">STUDENT PORTAL</div></div>
                <div class="l1-base d-box base" onclick="window.location.href='admission.html';"><div class="text-inner">GO</div></div>
                
                <div class="l2-stem d-box straight" onclick="window.location.href='e-library.html';"><div class="text-inner">E LIBRARY</div></div>
                <div class="l2-base d-box base" onclick="window.location.href='contact.html';"><div class="text-inner">END</div></div>
            </div>
        </section>

        <div class="flex flex-wrap gap-4 justify-center py-4">
            <button class="bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105" onclick="window.location.href = 'announcements.html';">View Announcements</button>
            <button class="bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105" onclick="window.location.href = 'CollCalendar.html';">Collegiate Calendar</button>
            <button class="bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105" onclick="window.location.href = 'facilities.html';">Facilities</button>
            <button class="bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105" onclick="window.location.href = 'gallery.html';">Gallery</button>
        </div>
    </main>

    <footer class="bg-gray-800 text-white text-center py-6">
        <p>&copy; 2026 Kolehiyo ng Lungsod ng Lipa</p>
        <div class="mt-4">
            <a href="admin-login.html" class="text-gray-500 hover:text-white text-xs transition">Administrator Login</a>
        </div>
    </footer>

    <button class="back-to-top fixed bottom-6 right-6 bg-kll-maroon text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center text-xl hidden z-50 cursor-pointer" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">
        &uarr;
    </button>

    <script src="alert.js"></script>
    <script src="navbar.js"></script>
    <script src="js/animation.js"></script>
    <script src="admin.js"></script>
    
    <script src="logoHover.js"></script>

    <script>
        // Back to Top button visibility logic
        window.addEventListener('scroll', function() {
            const btn = document.querySelector('.back-to-top');
            window.pageYOffset > 100 ? btn.classList.remove('hidden') : btn.classList.add('hidden');
        });
    </script>
</body>
</html>
