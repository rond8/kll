<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | KLL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-kll-maroon { background-color: #800000; }
        .text-kll-maroon { color: #800000; }
        
        body {
            background-image: linear-gradient(rgba(128, 0, 0, 0.85), rgba(0, 0, 0, 0.9)), url('asset/img/index.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden transition-all transform hover:scale-[1.01]">
        
        <div class="bg-kll-maroon p-8 text-center border-b-4 border-yellow-500">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-full mb-4 shadow-inner">
                <span class="text-kll-maroon font-black text-2xl">KLL</span>
            </div>
            <h1 class="text-white text-2xl font-bold tracking-tight">Admin Portal</h1>
            <p class="text-red-200 text-sm mt-1">Authorized Personnel Only</p>
        </div>

        <div class="p-8">
            <form id="loginForm" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2" for="username">Admin ID / Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </span>
                        <input type="text" id="username" name="username" required
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent outline-none transition"
                            placeholder="Enter your ID">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2" for="password">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </span>
                        <input type="password" id="password" name="password" required
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:border-transparent outline-none transition"
                            placeholder="••••••••">
                    </div>
                    <div class="text-right mt-2">
                    </div>
                </div>

                <div class="space-y-3 pt-2">
                    <button type="submit" id="loginBtn"
                        class="w-full bg-kll-maroon text-white font-bold py-3 rounded-lg shadow-lg hover:bg-red-900 transition active:transform active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed">
                        Log In
                    </button>
                    
                    <a href="index.html" 
                        class="block text-center w-full bg-gray-100 text-gray-600 font-bold py-3 rounded-lg hover:bg-gray-200 transition text-sm">
                        ← Back to Main Website
                    </a>
                </div>

            </form>
        </div>

        <div class="bg-gray-50 p-4 text-center border-t border-gray-100">
            <p class="text-xs text-gray-400">
                &copy; 2026 Kolehiyo ng Lungsod ng Lipa. <br>
                Information Systems Department.
            </p>
        </div>
    </div>

<script>
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    
    // Your Google Apps Script Web App URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrCGkMQV14kS1Y9KZOQziIBwoLHQciTWhxF82wNDIiVytFg8_C1wddDVF-jp5qsNA/exec";

    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // UI Feedback
        loginBtn.disabled = true;
        loginBtn.innerHTML = `<span class="inline-block animate-spin mr-2">↻</span> Authenticating...`;

        // Create FormData directly from the form
        const payload = new FormData(loginForm);

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: payload
        })
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json();
        })
        .then(data => {
            if (data.status === "success" || data.result === "success") {
                // Success! Redirect to dashboard
                window.location.href = "admin-dashboard.html";
            } else {
                // Failed login
                alert("Access Denied: " + (data.message || "Invalid credentials"));
                resetButton();
            }
        })
        .catch(error => {
            console.error('Error!', error);
            alert("Connection error. Check your internet or Google Script deployment.");
            resetButton();
        });
    });

    function resetButton() {
        loginBtn.disabled = false;
        loginBtn.innerText = "Log In";
    }
</script>
</body>
</html>
