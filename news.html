<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - Kolehiyo ng Lungsod ng Lipa</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        .bg-kll-maroon { background-color: #800000; }
        .text-kll-maroon { color: #800000; }
        .border-kll-maroon { border-color: #800000; }
        
        /* Back to top button style */
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #800000;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
            transition: opacity 0.3s;
        }

        /* News item hover effect */
        .news-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .news-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans leading-relaxed">

<div id="navbar"></div>
<nav class="bg-kll-maroon text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-md flex items-center justify-center text-kll-maroon font-bold text-xs shadow-inner overflow-hidden cursor-pointer" onclick="window.location.href='index.html';">
                    <img src="asset/img/schoolicon.jpg" alt="KLL Logo" class="w-full h-full object-cover">
                </div>
                <span class="font-bold text-lg sm:text-xl tracking-wide">Kolehiyo ng Lungsod ng Lipa</span>
            </div>
        </div>
    </div>
</nav>

<header class="w-full bg-gray-200 border-b-4 border-yellow-500">
    <div class="w-full h-64 md:h-96 bg-gray-300 flex items-center justify-center text-gray-500 italic text-xl shadow-inner overflow-hidden">
        <img src="asset/img/news.jpg" alt="KLL News" class="w-full h-full object-contain" onerror="this.style.display='none'; this.parentNode.innerHTML='[News Banner]'">
    </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8 flex flex-col gap-8">
    <div class="bg-white rounded-xl shadow-lg border-t-4 border-kll-maroon p-6">
        <h1 class="text-3xl font-extrabold text-kll-maroon">Latest News</h1>
        <p class="mt-2 text-gray-600">Stay updated with the latest announcements from Kolehiyo ng Lungsod ng Lipa.</p>

        <!-- DYNAMIC CONTAINER -->
        <div id="news-feed" class="mt-6 space-y-6">
            <p class="text-gray-500 animate-pulse">Loading latest announcements...</p>
        </div>
    </div>
</main>

<script src="navbar.js"></script>

<script>
    // Link to your KLL News Database
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMy67c31VN-hWKDWfq8E3yTVw6IMrDb4cMBhleSSsE-c3cy1k8S4tNimYYOq3OD5J4EmOJOuzsZtaU/pub?output=csv';

    function parseCSVLine(line) {
        let result = [];
        let curVal = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            let char = line[i];
            if (char === '"' && line[i+1] === '"') { curVal += '"'; i++; }
            else if (char === '"') { inQuotes = !inQuotes; }
            else if (char === ',' && !inQuotes) { result.push(curVal); curVal = ""; }
            else { curVal += char; }
        }
        result.push(curVal);
        return result;
    }

    async function fetchNews() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== "");
            const container = document.getElementById('news-feed');
            container.innerHTML = ''; 

            for (let i = 1; i < rows.length; i++) {
                const cols = parseCSVLine(rows[i]);
                
                if (cols && cols.length >= 4) {
                    const title = cols[0].trim();
                    const date = cols[1].trim();
                    const tag = cols[2].trim();
                    const content = cols[3].trim();
                    const link = cols[4] ? cols[4].trim() : "";

                    const linkButton = link ? `
                        <div class="mt-4">
                            <a href="${link}" target="_blank" class="inline-flex items-center text-sm font-bold text-kll-maroon hover:underline">
                                Read More 
                                <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </a>
                        </div>` : "";

                    container.innerHTML += `
                        <article class="news-card bg-white border border-gray-200 rounded-lg p-5 shadow-sm">
                            <header class="flex items-start justify-between gap-4 bg-white p-2 -mx-2 -mt-2 rounded-t-lg border-b border-gray-50 mb-3">
                                <div>
                                    <h2 class="text-xl font-bold text-gray-800">${title}</h2>
                                    <p class="text-xs text-gray-400 mt-1 uppercase tracking-tighter">${date}</p>
                                </div>
                                <span class="px-2 py-1 rounded text-[10px] font-bold uppercase tracking-widest ${tag.toLowerCase() === 'new' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-600'}">
                                    ${tag}
                                </span>
                            </header>
                            <p class="text-gray-700 leading-relaxed text-sm md:text-base">${content}</p>
                            ${linkButton}
                        </article>
                    `;
                }
            }
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('news-feed').innerHTML = "<p class='text-red-500'>Unable to load news. Please try again later.</p>";
        }
    }

    window.onload = function() {
        fetchNews();
        localStorage.setItem('kllNewsRead', 'true');
    };
</script>

<button class="back-to-top" style="display:none;" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">↑</button>

<script>
    // Back to Top visibility logic
    window.addEventListener('scroll', function() {
        const button = document.querySelector('.back-to-top');
        if(button) {
            window.pageYOffset > 300 ? button.style.display = 'block' : button.style.display = 'none';
        }
    });
</script>

</body>
</html>
