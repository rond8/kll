<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - Kolehiyo ng Lungsod ng Lipa</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        .bg-kll-maroon { background-color: #800000; }
        .text-kll-maroon { color: #800000; }
        .border-kll-maroon { border-color: #800000; }
        
        /* Back to top button style from your original design */
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #800000;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans leading-relaxed">

<div id="navbar"></div>
<nav class="bg-kll-maroon text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex items-center gap-3">
                  <div class="w-10 h-10 bg-white rounded-md flex items-center justify-center text-kll-maroon font-bold text-xs shadow-inner overflow-hidden">
                        <img src="asset/img/schoolicon.jpg" alt="KLL Logo" class="w-full h-full object-cover">
                    </div>
                <span class="font-bold text-lg sm:text-xl tracking-wide">Kolehiyo ng Lungsod ng Lipa</span>
            </div>
        </div>
    </div>
</nav>

<header class="w-full bg-gray-200 border-b-4 border-yellow-500">
    <div class="w-full h-64 md:h-96 bg-gray-300 flex items-center justify-center text-gray-500 italic text-xl shadow-inner overflow-hidden">
        <img src="asset/img/news.jpg" alt="KLL News" class="w-full h-full object-contain" onerror="this.style.display='none'; this.parentNode.innerHTML='[News Banner]'">
    </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8 flex flex-col gap-8">
    <div class="bg-white rounded-xl shadow-lg border-t-4 border-kll-maroon p-6">
        <h1 class="text-3xl font-extrabold text-kll-maroon">Latest News</h1>
        <p class="mt-2 text-gray-600">Stay updated with the latest announcements from Kolehiyo ng Lungsod ng Lipa.</p>

        <!-- DYNAMIC CONTAINER -->
        <div id="news-feed" class="mt-6 space-y-6">
            <p class="text-gray-500 animate-pulse">Loading latest announcements...</p>
        </div>
    </div>
</main>

<script src="navbar.js"></script>

<script>
    // Link to your KLL News Database[cite: 1]
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMy67c31VN-hWKDWfq8E3yTVw6IMrDb4cMBhleSSsE-c3cy1k8S4tNimYYOq3OD5J4EmOJOuzsZtaU/pub?output=csv';

    // Professional CSV Parser to prevent Title/Content from cutting off[cite: 1]
    function parseCSVLine(line) {
        let result = [];
        let curVal = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            let char = line[i];
            if (char === '"' && line[i+1] === '"') { curVal += '"'; i++; }
            else if (char === '"') { inQuotes = !inQuotes; }
            else if (char === ',' && !inQuotes) { result.push(curVal); curVal = ""; }
            else { curVal += char; }
        }
        result.push(curVal);
        return result;
    }

    async function fetchNews() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== "");
            const container = document.getElementById('news-feed');
            container.innerHTML = ''; 

            for (let i = 1; i < rows.length; i++) {
                const cols = parseCSVLine(rows[i]);
                
                if (cols && cols.length >= 4) {
                    const title = cols[0].trim();   // Title[cite: 1]
                    const date = cols[1].trim();    // Date[cite: 1]
                    const tag = cols[2].trim();     // Tag[cite: 1]
                    const content = cols[3].trim(); // Content[cite: 1]
                    const link = cols[4] ? cols[4].trim() : ""; // Link[cite: 1]

                    const linkButton = link ? `
                        <div class="mt-4">
                            <a href="${link}" target="_blank" class="inline-flex items-center text-sm font-bold text-kll-maroon hover:underline">
                                Read More 
                                <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </a>
                        </div>` : "";

                    container.innerHTML += `
                        <article class="border border-gray-200 rounded-lg p-5">
                            <header class="flex items-start justify-between gap-4">
                                <div>
                                    <h2 class="text-xl font-semibold text-gray-800">${title}</h2>
                                    <p class="text-sm text-gray-500 mt-1">${date}</p>
                                </div>
                                <span class="text-xs font-semibold uppercase tracking-wide ${tag.toLowerCase() === 'new' ? 'text-yellow-600' : 'text-gray-500'}">
                                    ${tag}
                                </span>
                            </header>
                            <p class="mt-3 text-gray-700 leading-relaxed">${content}</p>
                            ${linkButton}
                        </article>
                    `;
                }
            }
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('news-feed').innerHTML = "Unable to load news.";
        }
    }

    window.onload = function() {
        fetchNews();
        // Keep your original localstorage logic
        localStorage.setItem('kllNewsRead', 'true');
    };
</script>

<script>
    // Slideshow Logic - Keeping it exactly as you had it
    let currentIdx = 0;
    const slides = document.querySelectorAll('.mySlides');
    const slideInner = document.getElementById('slide-inner');
    const slideNum = document.getElementById('slide-num');

    function updateSlide() {
        if(slideInner) slideInner.style.transform = `translateX(-${currentIdx * 100}%)`;
        if(slideNum) slideNum.innerText = `${currentIdx + 1} / ${slides.length}`;
    }

    function moveSlide(direction) {
        currentIdx += direction;
        if (currentIdx >= slides.length) currentIdx = 0;
        if (currentIdx < 0) currentIdx = slides.length - 1;
        updateSlide();
        resetTimer();
    }

    let slideTimer = setInterval(() => moveSlide(1), 5000);

    function resetTimer() {
        clearInterval(slideTimer);
        slideTimer = setInterval(() => moveSlide(1), 5000);
    }

    // Back to Top script - Keeping it exactly as you had it
    window.addEventListener('scroll', function() {
        const button = document.querySelector('.back-to-top');
        if(button) {
            window.pageYOffset > 100 ? button.style.display = 'block' : button.style.display = 'none';
        }
    });
</script>

<button class="back-to-top" style="display:none;" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">↑</button>

</body>
</html>
