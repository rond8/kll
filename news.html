<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - Kolehiyo ng Lungsod ng Lipa</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        .bg-kll-maroon { background-color: #800000; }
        .text-kll-maroon { color: #800000; }
        .border-kll-maroon { border-color: #800000; }
        
        /* Back to top button style */
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #800000;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: opacity 0.3s;
        }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans leading-relaxed">

<div id="navbar"></div>
<nav class="bg-kll-maroon text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-md flex items-center justify-center text-kll-maroon font-bold text-xs shadow-inner overflow-hidden">
                    <img src="asset/img/schoolicon.jpg" alt="KLL Logo" class="w-full h-full object-cover">
                </div>
                <span class="font-bold text-lg sm:text-xl tracking-wide">Kolehiyo ng Lungsod ng Lipa</span>
            </div>
        </div>
    </div>
</nav>

<header class="w-full bg-gray-200 border-b-4 border-yellow-500">
    <div class="w-full h-64 md:h-96 bg-gray-300 flex items-center justify-center text-gray-500 italic text-xl shadow-inner overflow-hidden">
        <img src="asset/img/news.jpg" alt="KLL News" class="w-full h-full object-contain" onerror="this.style.display='none'; this.parentNode.innerHTML='[News Banner]'">
    </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8 flex flex-col gap-8">
    <div class="bg-white rounded-xl shadow-lg border-t-4 border-kll-maroon p-6">
        <h1 class="text-3xl font-extrabold text-kll-maroon">Latest News</h1>
        <p class="mt-2 text-gray-600">Stay updated with the latest announcements from Kolehiyo ng Lungsod ng Lipa.</p>

        <!-- DYNAMIC CONTAINER -->
        <div id="news-feed" class="mt-6 space-y-6">
            <p class="text-gray-500 animate-pulse">Loading latest announcements...</p>
        </div>
    </div>
</main>

<button class="back-to-top hidden" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">↑</button>

<script>
    // YOUR PUBLISHED CSV URL
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMy67c31VN-hWKDWfq8E3yTVw6IMrDb4cMBhleSSsE-c3cy1k8S4tNimYYOq3OD5J4EmOJOuzsZtaU/pub?output=csv';

    async function fetchNews() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            
            // Split rows and skip header
            const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
            const container = document.getElementById('news-feed');
            container.innerHTML = ''; 

            rows.forEach(row => {
                // REGEX to handle commas inside quotes
                const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                
                if (cols && cols.length >= 4) {
                    // Clean quotes from the data[cite: 1]
                    const title = cols[0].replace(/^"|"$/g, "").trim();
                    const date = cols[1].replace(/^"|"$/g, "").trim();
                    const tag = cols[2].replace(/^"|"$/g, "").trim();
                    const content = cols[3].replace(/^"|"$/g, "").trim();

                    // Generate the HTML using your exact classes
                    const article = `
                        <article class="border border-gray-200 rounded-lg p-5">
                            <header class="flex items-start justify-between gap-4">
                                <div>
                                    <h2 class="text-xl font-semibold text-gray-800">${title}</h2>
                                    <p class="text-sm text-gray-500 mt-1">${date}</p>
                                </div>
                                <span class="text-xs font-semibold uppercase tracking-wide ${tag.toLowerCase() === 'new' ? 'text-yellow-600' : 'text-gray-500'}">
                                    ${tag}
                                </span>
                            </header>
                            <p class="mt-3 text-gray-700 leading-relaxed">${content}</p>
                        </article>
                    `;
                    container.innerHTML += article;
                }
            });
        } catch (error) {
            console.error("Error loading sheet:", error);
            document.getElementById('news-feed').innerHTML = "Unable to load news at this time.";
        }
    }

    // Scroll Logic for Back to Top
    window.addEventListener('scroll', function() {
        const button = document.querySelector('.back-to-top');
        window.pageYOffset > 100 ? button.classList.remove('hidden') : button.classList.add('hidden');
    });

    // Run fetcher on load
    window.onload = fetchNews;
</script>

<script src="navbar.js"></script>
</body>
</html>
